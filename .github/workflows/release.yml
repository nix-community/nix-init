name: release

on:
  push:
    tags:
      - v[0-9]+.[0-9]+.[0-9]+

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Release
        run: |
          gh release create "$GITHUB_REF" \
            --repo "$GITHUB_REPOSITORY" \
            --notes "[CHANGELOG.md](https://github.com/nix-community/nix-init/blob/$GITHUB_REF/CHANGELOG.md)"
        env:
          GITHUB_TOKEN: ${{ github.token }}
